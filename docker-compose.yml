services:
  iris:
    image: intersystems/irishealth-community:latest-em
    ports:
      - "1972:1972"
      - "52773:52773"
    volumes:
      - iris-data:/durable
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-lc",
          "echo -e 'zn \"%SYS\"\\nset sc=##class(Security.Users).UnExpireUserPasswords(\"_SYSTEM\")\\nhalt' | iris session IRIS && echo > /dev/tcp/127.0.0.1/52773",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  labcore:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      iris:
        condition: service_healthy
    environment:
      IRIS_HOST: iris
      IRIS_PORT: 1972
      IRIS_NAMESPACE: USER
      IRIS_USERNAME: _SYSTEM
      IRIS_PASSWORD: SYS
    ports:
      - "8000:8000"

volumes:
  iris-data:
