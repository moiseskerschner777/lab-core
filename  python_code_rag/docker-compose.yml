services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    environment:
      IRIS_HOST: iris
      IRIS_PORT: 1972
      IRIS_NAMESPACE: USER
      IRIS_USERNAME: _SYSTEM
      IRIS_PASSWORD: SYS
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL: snowflake-arctic-embed2
      EMBED_DIM: 1024
      EMBED_PARALLELISM: 16
      OLLAMA_NUM_CTX: 8192
    volumes:
      - ../projectA:/workspace/projectA:ro
      - ../projectB:/workspace/projectB:ro
      - ../projectC:/workspace/projectC:ro
    networks:
      - default
      - lab-core_default

networks:
  lab-core_default:
    external: true

volumes:
  ollama_data:
